name: Release (Create Tag)

on:
  push:
    branches:
    - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag-from-pr:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      # --------------------------------------------------
      # Checkout full history
      # --------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------
      # Get PR associated with this commit
      # --------------------------------------------------
      - name: Get merged PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            if (prs.data.length === 0) {
              core.info("No PR associated with commit.");
              return null;
            }
            return prs.data[0];

      - name: Exit if no PR
        if: steps.pr.outputs.result == ''
        run: |
          echo "No PR found. Skipping release."
          exit 0

      # --------------------------------------------------
      # Determine release type from labels
      # --------------------------------------------------
      # --------------------------------------------------
      # Determine release type from labels
      # --------------------------------------------------
      - name: Determine release type
        id: release
        run: |
          LABELS='${{ steps.pr.outputs.result }}'
          echo "PR data: $LABELS"

          # Extract label names from JSON using jq
          if command -v jq &> /dev/null; then
            LABEL_NAMES=$(echo "$LABELS" | jq -r '.labels[].name' 2>/dev/null || echo "")
          else
            # Fallback: grep for labels in JSON
            LABEL_NAMES=$(echo "$LABELS" | grep -o '"name":"[^"]*"' | cut -d'"' -f4 || echo "")
          fi

          echo "PR Labels: $LABEL_NAMES"
          COUNT=0
          for t in major minor patch; do
            if echo "$LABEL_NAMES" | grep -q "release:$t"; then
              TYPE=$t
              COUNT=$((COUNT+1))
            fi
          done
          if [[ "$COUNT" -eq 0 ]]; then
            echo "No release label found. Skipping."
            exit 0
          fi
          if [[ "$COUNT" -gt 1 ]]; then
            echo "Multiple release labels found. Failing."
            exit 1
          fi
          echo "TYPE=$TYPE" >> $GITHUB_OUTPUT

      # --------------------------------------------------
      # Fetch tags
      # --------------------------------------------------
      - name: Fetch tags
        run: git fetch --tags

      # --------------------------------------------------
      # Skip if commit already tagged
      # --------------------------------------------------
      - name: Check if commit already tagged
        id: tagged
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "ALREADY_TAGGED=true" >> $GITHUB_OUTPUT
          else
            echo "ALREADY_TAGGED=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if already tagged
        if: steps.tagged.outputs.ALREADY_TAGGED == 'true'
        run: |
          echo "Commit already has a version tag. Skipping."
          exit 0

      # --------------------------------------------------
      # Determine latest tag
      # --------------------------------------------------
      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [[ -z "$TAG" ]]; then
            TAG="v0.0.0"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      # --------------------------------------------------
      # Calculate next version
      # --------------------------------------------------
      - name: Calculate next version
        id: version
        run: |
          RAW_TAG="${{ steps.latest.outputs.TAG }}"
          CLEAN_TAG="${RAW_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN_TAG"
          case "${{ steps.release.outputs.TYPE }}" in
            major)
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR+1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH+1))
              ;;
          esac
          VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $VERSION"

      # --------------------------------------------------
      # Ensure tag does not already exist remotely
      # --------------------------------------------------
      - name: Check if tag already exists
        id: tag_exists
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if tag exists
        if: steps.tag_exists.outputs.EXISTS == 'true'
        run: |
          echo "Tag already exists. Skipping."
          exit 0

      # --------------------------------------------------
      # Configure git identity
      # --------------------------------------------------
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # --------------------------------------------------
      # Create and push tag
      # --------------------------------------------------
      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "Successfully created tag $VERSION"
